plugins {
    id "com.android.library"
    id "com.vanniktech.maven.publish" version "0.28.0"
    id "maven-publish"
    id "signing"
}

android {
    compileSdkVersion 30
    buildToolsVersion "30.0.3"
    namespace 'com.globalpayments.library'
    buildFeatures {
        buildConfig true
    }
    defaultConfig {
        minSdkVersion 19
        targetSdkVersion 30
        versionCode 33
        versionName "2.0.4"

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"

        buildConfigField("String","VERSION_NAME","\"${defaultConfig.versionName}\"")
        multiDexEnabled true
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            minifyEnabled false
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    packagingOptions {
        resources {
            excludes += [
                    "META-INF/DEPENDENCIES",
                    "META-INF/LICENSE",
                    "META-INF/LICENSE.txt",
                    "META-INF/license.txt",
                    "META-INF/NOTICE",
                    "META-INF/NOTICE.txt",
                    "META-INF/notice.txt",
                    "META-INF/ASL2.0"
            ]
        }
    }

}

dependencies {

    implementation 'androidx.appcompat:appcompat:1.1.0'
    implementation 'androidx.legacy:legacy-support-v4:1.0.0'
    //implementation 'com.google.code.gson:gson:2.8.6'
    implementation 'com.google.android.material:material:1.2.0-alpha06'
    // Global payments SDK
    implementation 'com.heartlandpaymentsystems:globalpayments-sdk:14.2.8'
    //implementation files('libs/globalpayments-sdk.jar')

    /** Vital SDK dependencies - Start **/
    //switch out commented code to change between local and hosted vital libs
    /*api project(path: ':vital-sdk:bbpos')
    api project(path: ':vital-sdk:core')
    api project(path: ':vital-sdk:ingenico')
    api project(path: ':vital-sdk:portico')
    api project(path: ':vital-sdk:roamreader')
    api project(path: ':vital-sdk:transaction-manager')
    api project(path: ':vital-sdk:database-portico')
    api project(path: ':vital-sdk:temlibrary')
    api project(path: ':vital-sdk:ruadeviceservice')*/
    api 'com.heartlandpaymentsystems:globalpayments-bbpos:1.0.8'
    api 'com.heartlandpaymentsystems:globalpayments-core:1.0.16'
    api 'com.heartlandpaymentsystems:globalpayments-ingenico:1.0.16'
    api 'com.heartlandpaymentsystems:globalpayments-portico:1.0.18'
    api 'com.heartlandpaymentsystems:globalpayments-roamreader:1.0.4'
    api 'com.heartlandpaymentsystems:globalpayments-ruadeviceservice:1.0.0'
    api 'com.heartlandpaymentsystems:globalpayments-temlibrary:1.0.0'
    api 'com.heartlandpaymentsystems:globalpayments-database-portico:1.0.3'
    api 'com.heartlandpaymentsystems:globalpayments-transaction-manager:1.0.19'

    // Apache Commons
    //implementation 'commons-codec:commons-codec:1.13'

    // Dates & Times
    //implementation 'joda-time:joda-time:2.10'

    // Timber Logging: https://github.com/JakeWharton/timber
    implementation 'com.jakewharton.timber:timber:4.7.1'

    // Google GSON
    api 'com.google.code.gson:gson:2.8.4'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    /** Vital SDK dependencies - End **/

    testImplementation 'junit:junit:4.13'
    androidTestImplementation 'androidx.test:core:1.3.0-rc01'
    androidTestImplementation 'androidx.test:runner:1.3.0-rc01'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.3.0-rc01'
    androidTestImplementation 'androidx.test:rules:1.2.0'
    androidTestImplementation 'androidx.test.ext:junit:1.1.2-rc01'

    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.4.1'
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-core:1.4.1'

    compileOnly 'org.projectlombok:lombok:1.18.30'
    annotationProcessor 'org.projectlombok:lombok:1.18.30'
    testCompileOnly "org.projectlombok:lombok:1.18.30"
    testAnnotationProcessor "org.projectlombok:lombok:1.18.30"

    implementation "androidx.sqlite:sqlite:2.0.1"

    // Test helpers for Room
    def room_version = '2.2.5'
    testImplementation("androidx.room:room-testing:$room_version") {
        exclude group: 'com.google.code.gson', module: 'gson'
    }
    androidTestImplementation "androidx.room:room-testing:$room_version"
    annotationProcessor "androidx.room:room-compiler:$room_version"

    // Android Support Libraries
    implementation 'androidx.appcompat:appcompat:1.0.2'

    testImplementation 'junit:junit:4.12'
    androidTestImplementation 'androidx.test.ext:junit:1.1.2'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.3.0'

    // Android Worker package
    def work_version = "2.4.0"
    implementation "androidx.work:work-runtime:$work_version"
    androidTestImplementation "androidx.work:work-runtime:$work_version"
    androidTestImplementation "androidx.work:work-testing:$work_version"
}

import com.vanniktech.maven.publish.SonatypeHost

// Artifact parameters
def sdkGroupId = 'com.heartlandpaymentsystems'
def sdkArtifactId = 'android-device-lib'
def sdkVersion = android.defaultConfig.versionName

afterEvaluate {
    publishing {
        publications {
            release(MavenPublication) {
                groupId = sdkGroupId
                artifactId = sdkArtifactId
                version = sdkVersion

                afterEvaluate {
                    from components.release
                }

                pom {
                    name = sdkArtifactId
                    description = 'The official Global Payments Android Device Library.'
                    url = 'https://developer.globalpay.com/'

                    licenses {
                        license {
                            name = 'The MIT License (MIT)'
                            url = 'https://opensource.org/licenses/MIT'
                        }
                    }

                    developers {
                        developer {
                            id = 'globalpayments'
                            name = 'Global Payments'
                            email = 'developers@globalpayments.com'
                        }
                    }

                    scm {
                        connection = 'scm:git:git://github.com/globalpayments/android-device-lib.git'
                        developerConnection = 'scm:git:ssh://globalpayments/android-device-lib.git'
                        url = 'https://github.com/globalpayments/android-device-lib'
                    }
                }
            }
        }

        repositories {
            maven {
                name = "ossrh-staging-api"
                url = "https://ossrh-staging-api.central.sonatype.com/service/local/staging/deploy/maven2/"
            }
        }
    }

    mavenPublishing {
        publishToMavenCentral(SonatypeHost.CENTRAL_PORTAL)
        coordinates(sdkGroupId, sdkArtifactId, sdkVersion)
        signAllPublications()

        pom {
            name = sdkArtifactId
            description = 'The official Global Payments Android Device Library.'
            url = 'https://developer.globalpay.com/'
            licenses {
                license {
                    name = 'The MIT License (MIT)'
                    url = 'https://opensource.org/licenses/MIT'
                }
            }

            developers {
                developer {
                    id = 'globalpayments'
                    name = 'Global Payments'
                    email = 'developers@globalpayments.com'
                }
            }

            scm {
                connection = 'scm:git:git://github.com/globalpayments/android-device-lib.git'
                developerConnection = 'scm:git:ssh://globalpayments/android-device-lib.git'
                url = 'https://github.com/globalpayments/android-device-lib'
            }
        }
    }
}

signing {
    sign publishing.publications
}
